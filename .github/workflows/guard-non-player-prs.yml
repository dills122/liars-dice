name: Guard Non-Player PRs

on:
  pull_request:
    branches: [main]

jobs:
  check-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for non-player files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          changed=$(git diff --name-only origin/main HEAD | grep -v '^players/' || true)

          if [ -z "$changed" ]; then
            echo "All changed files are in players/ — OK"
            exit 0
          fi

          echo "Non-player files changed: $changed"

          is_admin=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission \
            --jq '.permission == "admin"' 2>/dev/null || echo "false")

          if [ "$is_admin" = "true" ]; then
            echo "Actor ${{ github.actor }} is admin — allowing"
            exit 0
          fi

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "❌ This PR modifies files outside \`players/\`. Only admins may change other parts of the repository. Files: $(echo "$changed" | tr '\n' ' ')"
          exit 1
